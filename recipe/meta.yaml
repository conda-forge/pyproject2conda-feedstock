{% set name = "pyproject2conda" %}
{% set version = "0.23.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyproject2conda-{{ version }}.tar.gz
  sha256: 50afc13e1066c756fe24fd195bae0d2534173592073d11833699b8d166be9736

build:
  entry_points:
    - p2c = pyproject2conda.cli:app
    - pyproject2conda = pyproject2conda.cli:app
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - uv-build >=0.11.8,<0.12.0
    - pip
  run:
    - python >={{ python_min }}
    - packaging >=26.1
    - pydantic >=2.12.5
    - tomli
    - typer
    - typing-extensions

test:
  imports:
    - pyproject2conda
  commands:
    - pip check
    - pyproject2conda --help
    - p2c --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/usnistgov/pyproject2conda
  summary: A script to convert a Python project declared on a pyproject.toml to a conda environment.
  description: |
    A script to convert a Python project declared on a pyproject.toml to a conda environment.
  license: NIST-PD
  license_file: LICENSE

extra:
  recipe-maintainers:
    - wpk-nist-gov
